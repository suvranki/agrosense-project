<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroSense – Complete Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-scene"></div>
  <div class="bg-grid"></div>
  <div class="particles" id="particles"></div>
  <div id="toast-container"></div>

  <div class="page-wrap">
    <div class="container">

      <div class="logo-block">
        <span class="logo-icon">🌿</span>
        <h1 class="logo-title" style="font-size:22px">PROFILE SETUP</h1>
        <p class="logo-sub" id="welcome-name">WELCOME FARMER</p>
      </div>

      <div class="card">
        <!-- Progress -->
        <div style="display:flex;gap:8px;margin-bottom:28px;align-items:center;">
          <div style="flex:1;height:4px;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--cyan));box-shadow:0 0 8px rgba(77,255,145,0.5)"></div>
          <div style="flex:1;height:4px;border-radius:2px;background:#1a2030"></div>
          <div style="flex:1;height:4px;border-radius:2px;background:#1a2030"></div>
        </div>
        <p class="text-dim fs-12 mb-16" style="font-family:var(--font-display);letter-spacing:2px">STEP 1 OF 3 · PERSONAL INFO</p>

        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input type="text" class="form-input" id="p-name" placeholder="Ramesh Kumar" />
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Age *</label>
            <input type="number" class="form-input" id="p-age" placeholder="35" />
          </div>
          <div class="form-group">
            <label class="form-label">Gender</label>
            <select class="form-input" id="p-gender">
              <option value="">Select</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email ID (optional)</label>
          <input type="email" class="form-input" id="p-email" placeholder="farmer@example.com" />
        </div>

        <div class="form-group">
          <label class="form-label">Gmail (for notifications)</label>
          <input type="email" class="form-input" id="p-gmail" placeholder="farmer@gmail.com" />
        </div>

        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-input" id="p-phone" placeholder="+91 98765 43210" />
        </div>

        <div class="form-group">
          <label class="form-label">Language Preference</label>
          <select class="form-input" id="p-lang">
            <option value="en">English</option>
            <option value="hi">हिंदी (Hindi)</option>
            <option value="mr">मराठी (Marathi)</option>
            <option value="te">తెలుగు (Telugu)</option>
            <option value="ta">தமிழ் (Tamil)</option>
            <option value="kn">ಕನ್ನಡ (Kannada)</option>
            <option value="gu">ગુજરાતી (Gujarati)</option>
            <option value="bn">বাংলা (Bengali)</option>
            <option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
            <option value="or">ଓଡ଼ିଆ (Odia)</option>
          </select>
        </div>

        <!-- Notice for no-email users -->
        <div style="background:rgba(77,200,255,0.06);border:1px solid rgba(77,200,255,0.2);border-radius:12px;padding:14px;margin-bottom:16px;">
          <p style="font-size:12px;color:var(--cyan);line-height:1.7;">
            💡 <strong>No email?</strong> That's okay! You can use just your phone number to receive SMS alerts when your soil is dry or the pump activates.
          </p>
        </div>

        <div style="display:flex;gap:10px;">
          <button class="btn btn-secondary" style="flex:1" onclick="window.location.href='index.html'">← BACK</button>
          <button class="btn btn-primary" style="flex:2;margin-top:0" onclick="saveProfile()">NEXT: FARM SETUP →</button>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
  <script>initParticles(); initProfilePage();</script>
</body>
</html>
